name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # - platform: 'macos-latest'
          #   args: '--target aarch64-apple-darwin'
          #   name: 'macOS-Apple-Silicon'
          # - platform: 'macos-latest'
          #   args: '--target x86_64-apple-darwin'
          #   name: 'macOS-Intel'
          # - platform: 'ubuntu-22.04'
          #   args: ''
          #   name: 'Linux'
          - platform: 'windows-latest'
            args: ''
            name: 'Windows'

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          cache-dependency-path: '**/pnpm-lock.yaml'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: '阿米巴单位时间核算表 ${{ github.ref_name }}'
          releaseBody: |
            ## 更新内容
            - 自动构建发布

            ## 下载说明
            - **Windows**: 下载 `.msi` 或 `.exe` 文件
            - **macOS**: Apple Silicon 下载 `aarch64.dmg`，Intel 下载 `x86_64.dmg`
            - **Linux**: 下载 `.deb` 或 `.AppImage` 文件

            ## 安装运行
            1. 下载对应平台的安装包
            2. Windows: 运行 `.msi` 安装程序
            3. macOS: 打开 `.dmg` 拖拽到应用程序
            4. Linux: `sudo dpkg -i *.deb` 或运行 `.AppImage`
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
      - name: List Windows bundle output (debug)
        if: matrix.platform == 'windows-latest'
        run: |
          echo "Listing bundle output (Windows):"
          # Prefer Windows style path on windows runner, fallback to posix path for other shells
          if [ -d "src-tauri/target/release/bundle/nsis" ]; then
            ls -la src-tauri/target/release/bundle/nsis || true
          else
            powershell -NoProfile -Command "Get-ChildItem -Path src-tauri\\target\\release\\bundle\\nsis -Force -ErrorAction SilentlyContinue | Format-List" || echo "No NSIS directory found"
          fi

      - name: Upload Windows build artifacts
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: windows-installers-${{ github.ref_name }}
          path: |
            src-tauri/target/release/bundle/nsis/**
            src-tauri/target/release/bundle/msi/**      # include MSI if produced